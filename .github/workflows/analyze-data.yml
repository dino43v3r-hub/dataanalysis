name: Analyze Data

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run analyzer
        run: python data_analyzer.py --input data --output reports

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: analysis-reports
          path: reports/
